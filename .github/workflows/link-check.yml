# ------------------------------------------------------------------------------
# link-check.yml - Weekly link checking workflow
#
# Runs every Monday at 08:00 UTC and can be triggered manually.
# Checks all URLs in README.md for broken or dead links.
# Reports results as a GitHub Actions summary — does not fail the build
# on broken links to avoid noise from temporary outages.
# ------------------------------------------------------------------------------

name: Link Check

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday at 08:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,206,429
            --timeout 30
            --max-retries 3
            --exclude "^https://localhost"
            --exclude "^http://localhost"
            README.md
          fail: false   # Report only — do not fail CI on broken links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: lychee/out.md
          retention-days: 30
